<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sankofa — offline</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #0a0f0d;
    color: #e7efe9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }
  .card {
    max-width: 460px;
    text-align: center;
    padding: 36px;
    background: #141d1a;
    border: 1px solid #2a3a35;
    border-radius: 22px;
  }
  .icon {
    width: 48px; height: 48px; margin: 0 auto 18px;
    border-radius: 14px;
    background: linear-gradient(135deg, #2cc295, #f4a949);
    display: flex; align-items: center; justify-content: center;
    color: #000; font-weight: 700; font-size: 22px;
  }
  h1 { font-size: 26px; margin: 0 0 12px; line-height: 1.2; }
  p { color: #8aa39a; line-height: 1.6; margin: 6px 0; font-size: 14px; }
  .pill { display: inline-block; margin-top: 18px; background: #2cc295; color: #000; font-weight: 600; padding: 12px 22px; border-radius: 999px; cursor: pointer; border: 0; font-size: 14px; }
  .pill:hover { background: #f4a949; }
  .muted { font-size: 12px; color: #6b8079; margin-top: 18px; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">S</div>
    <h1>You&apos;re offline.</h1>
    <p>The network dropped. Your work is safe — Sankofa stores everything locally on this device.</p>
    <p>Come back when you have signal. Your edits will sync automatically.</p>
    <button class="pill" onclick="location.reload()">Try again</button>
    <p class="muted">Local-first means you keep building, even without bars.</p>
  </div>
</body>
</html>
